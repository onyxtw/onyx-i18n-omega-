name: ONYX Runtime

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run-onyx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run ONYX Runtime
        run: npm start
