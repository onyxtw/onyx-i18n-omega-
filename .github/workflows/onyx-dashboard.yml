name: ONYX Runtime Dashboard

on:
  push:
    branches: [ main ]

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run ONYX Runtime and capture output
        run: |
          npm start > runtime_output.txt

      - name: Generate Dashboard HTML
        run: |
          echo "<html><body><h1>ONYX Runtime Dashboard</h1><pre>" > dashboard.html
          cat runtime_output.txt >> dashboard.html
          echo "</pre></body></html>" >> dashboard.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
